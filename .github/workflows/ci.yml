name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CF_WEB_ANALYTICS_TOKEN: ${{ secrets.NEXT_PUBLIC_CF_WEB_ANALYTICS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
